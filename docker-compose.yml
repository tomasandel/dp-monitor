services:
  monitor:
    build: .
    restart: unless-stopped
    network_mode: host
    extra_hosts:
      - "loga.jvgc-a.com:127.0.0.1"
      - "logb.jvgc-a.com:127.0.0.1"
      - "logs.jvgc-a.com:127.0.0.1"
      - "api.jvgc-a.com:127.0.0.1"
    environment:
      BACKEND_URL: ${BACKEND_URL}
      MONITOR_ID: ${MONITOR_ID}
      POLL_INTERVAL_MS: ${POLL_INTERVAL_MS}
      MONITOR_API_KEY: ${MONITOR_API_KEY}
      CT_LOG_LIST_URL: ${CT_LOG_LIST_URL}
